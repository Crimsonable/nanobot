<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>施工现场安全隐患综合分析报告</title>
<style>
:root{--bg:#060a10;--card:#0f1a2a;--border:#1a2a40;--text:#cdd1d9;--text2:#5a6a7e;--dark-red:#b91c1c;--red:#ef4444;--orange:#f97316;--green:#22c55e;--blue:#60a5fa;--dark-red-bg:rgba(185,28,28,.18);--dark-red-bd:rgba(185,28,28,.5);--red-bg:rgba(239,68,68,.13);--red-bd:rgba(239,68,68,.4);--orange-bg:rgba(249,115,22,.13);--orange-bd:rgba(249,115,22,.4)}
html{background:var(--bg);height:100%;overflow-y:auto;-webkit-text-size-adjust:100%}
body{min-height:100%;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.55;margin:0;padding:0}
.cover{min-height:calc(var(--vh,1vh)*100);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 32px;background:linear-gradient(160deg,#041428 0%,#0b1e3c 45%,#061020 100%);text-align:center}
.cover .logo{width:72px;height:72px;border-radius:18px;object-fit:cover;margin-bottom:20px;background:#0d2340;border:2px solid rgba(96,165,250,.3)}
.cover h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:700;margin:0 0 8px;color:#fff}
.cover .sub{font-size:.85rem;color:var(--text2);margin-bottom:24px}
.badge-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.badge{padding:5px 14px;border-radius:99px;font-size:.75rem;font-weight:600}
.bg-dark-red{background:var(--dark-red-bg);border:1px solid var(--dark-red-bd);color:#fca5a5}
.bg-red{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.bg-orange{background:var(--orange-bg);border:1px solid var(--orange-bd);color:var(--orange)}
.stat-row{display:flex;gap:16px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 20px;text-align:center;min-width:90px}
.stat .num{font-size:1.7rem;font-weight:800;color:#fff;line-height:1}
.stat .label{font-size:.7rem;color:var(--text2);margin-top:4px}
.section-header{max-width:720px;margin:0 auto;padding:20px 16px 10px;display:flex;align-items:center;gap:10px}
.section-header h3{font-size:.85rem;font-weight:700;color:var(--text);margin:0}
.section-header .line{flex:1;height:1px;background:var(--border)}
.total-bar{max-width:720px;margin:0 auto;padding:0 16px 12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.total-chip{font-size:.72rem;font-weight:600;padding:5px 12px;border-radius:99px}
.total-dark-red{background:var(--dark-red-bg);color:#fca5a5;border:1px solid var(--dark-red-bd)}
.total-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.total-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.point-card{margin:16px auto;max-width:720px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.info-section{padding:16px 18px;border-bottom:1px solid var(--border)}
.info-row{display:flex;gap:8px;padding:6px 0;font-size:.8rem}
.info-label{min-width:70px;color:var(--text2);flex-shrink:0}
.info-value{color:var(--text)}
.scene-section{padding:12px 18px;background:rgba(96,165,250,.05);border-bottom:1px solid var(--border)}
.scene-tags{display:flex;gap:8px;flex-wrap:wrap}
.scene-tag{padding:4px 10px;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);border-radius:6px;font-size:.7rem;color:var(--blue)}
.hazard-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.hazard-stage{border-radius:10px;padding:12px 14px;margin-bottom:12px}
.hazard-stage:last-child{margin-bottom:0}
.stage-major{background:var(--dark-red-bg);border:1px solid var(--dark-red-bd)}
.stage-atlas{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.4)}
.stage-abcde{background:rgba(255,255,255,.03);border:1px solid var(--border)}
.stage-title{font-size:.78rem;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)}
.stage-major .stage-title{color:#fca5a5}
.stage-atlas .stage-title{color:var(--blue)}
.stage-abcde .stage-title{color:var(--text)}
.hazard-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.hazard-item:last-child{border-bottom:none}
.hazard-num{min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;flex-shrink:0}
.hazard-num.major{background:rgba(185,28,28,.3);color:#fca5a5}
.hazard-num.atlas{background:rgba(96,165,250,.3);color:var(--blue)}
.hazard-num.a{background:rgba(96,165,250,.2);color:#93c5fd}
.hazard-num.b{background:rgba(34,197,94,.2);color:#86efac}
.hazard-num.c{background:rgba(249,115,22,.2);color:#fdba74}
.hazard-num.d{background:rgba(168,85,247,.2);color:#d8b4fe}
.hazard-num.e{background:rgba(236,72,153,.2);color:#f9a8d4}
.hazard-content{flex:1}
.hazard-desc{font-size:.78rem;margin-bottom:4px}
.hazard-clause{background:rgba(0,0,0,.2);border-radius:6px;padding:8px 10px;font-size:.7rem}
.clause-std{color:var(--blue);font-weight:600;margin-bottom:2px}
.clause-text{color:var(--text2);line-height:1.4}
.hazard-level{margin-left:auto;flex-shrink:0}
.level-tag{padding:2px 6px;border-radius:4px;font-size:.65rem;font-weight:700}
.level-dark-red{background:rgba(185,28,28,.3);color:#fca5a5}
.level-severe{background:rgba(239,68,68,.25);color:var(--red)}
.level-general{background:rgba(249,115,22,.25);color:var(--orange)}
.level-suggestion{background:rgba(96,165,250,.25);color:var(--blue)}
.evaluation-section{padding:14px 18px;background:rgba(239,68,68,.05);border-bottom:1px solid rgba(239,68,68,.2)}
.eval-title{font-size:.8rem;font-weight:700;color:var(--red);margin-bottom:10px}
.eval-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.eval-stat{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:600}
.stat-dark-red{background:var(--dark-red-bg);color:#fca5a5}
.stat-severe{background:var(--red-bg);color:var(--red)}
.stat-general{background:var(--orange-bg);color:var(--orange)}
.priority-item{display:flex;gap:8px;padding:6px 0;font-size:.75rem}
.priority-label{font-weight:700;flex-shrink:0}
.priority-label.p0{color:#fca5a5}
.priority-label.p1{color:var(--red)}
.priority-label.p2{color:var(--orange)}
.priority-content{color:var(--text)}
.action-section{padding:14px 18px}
.action-title{font-size:.78rem;font-weight:700;margin-bottom:8px}
.action-title.p0{color:#fca5a5}
.action-title.p1{color:var(--red)}
.action-title.p2{color:var(--orange)}
.action-item{display:flex;gap:8px;padding:6px 10px;background:rgba(0,0,0,.2);border-radius:6px;margin-bottom:6px;font-size:.75rem}
.action-item:last-child{margin-bottom:0}
.action-num{min-width:20px;color:var(--text2)}
.action-text{color:var(--text)}
.footer{padding:20px 24px 28px;text-align:center;border-top:1px solid var(--border);margin-top:8px}
.footer-inner{display:flex;align-items:center;justify-content:center;gap:8px}
.footer-logo{width:28px;height:28px;border-radius:8px;object-fit:cover;background:#0d2340}
.footer-text{font-size:.72rem;color:var(--text2)}
.footer-text span{color:var(--blue)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
td,th{padding:9px 14px}
.risk-th{text-align:center!important}
.td-center{text-align:center}
.bb{border-bottom:1px solid rgba(255,255,255,.05)}
.bt{border-top:1px solid var(--border)}
.tfoot-tr{background:rgba(239,68,68,.05)}
.tfoot-td{color:#fff!important;font-weight:700}
@media(min-width:640px){
  .point-card{margin:20px auto}
  .section-header{padding:20px 0 10px}
}
@media(max-width:639px){
  .point-card{margin:16px auto}
  .hazard-desc{font-size:.72rem}
}
</style>
</head>
<body>

<!-- 封面 - 由AI动态生成 -->

<!-- 点位卡片模板 -->
<!--
  每个点位包含5个标准区块：
  1. 图片
  2. 基本信息
  3. 场景认定
  4. 隐患清单（三阶段）
  5. 综合评价
  6. 整改优先级
-->
<!--
  隐患清单结构：
  ★★★ 第一阶段：集团重大隐患清单匹配（深红色，至少3项）
  ★★ 第二阶段：成都院隐患图册匹配（蓝色，至少3项）
  ★ 第三阶段：ABCDE规范匹配（每类至少3项）

  每个隐患项包含：
  - 序号
  - 描述
  - 等级标签
  - 条款详情（规范名称、条款编号、条款内容）
-->

<!-- 模板结束 -->
</body>
</html>
