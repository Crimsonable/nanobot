apiVersion: v1
kind: Service
metadata:
  name: container-up
  namespace: nanobot
spec:
  selector:
    app: container-up
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: container-up
  namespace: nanobot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: container-up
  template:
    metadata:
      labels:
        app: container-up
    spec:
      containers:
        - name: container-up
          image: nanobot-container-up:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CONTAINER_UP_PORT
              value: "8080"
            - name: CONTAINER_UP_DB_PATH
              value: /var/lib/container_up/container_up.db
            - name: FRONTENDS_CONFIG_PATH
              value: /mnt/nanobot/frontends/frontends.json
            - name: BUCKET_SERVICE_NAME
              value: nanobot-bucket
            - name: BUCKET_STATEFULSET_NAME
              value: nanobot-bucket
            - name: BUCKET_NAMESPACE
              value: nanobot
            - name: BUCKET_COUNT
              value: "4"
            - name: HOST_WORKSPACE_ROOT
              value: /mnt/nanobot/workspaces
            - name: CHILD_WORKSPACE_TARGET
              value: /mnt/nanobot/workspaces
            - name: NANOBOT_WORKSPACE_LAYOUT
              value: frontend-user
          volumeMounts:
            - name: gateway-data
              mountPath: /var/lib/container_up
            - name: common
              mountPath: /mnt/nanobot/common
              readOnly: true
            - name: frontends
              mountPath: /mnt/nanobot/frontends
              readOnly: true
            - name: workspaces
              mountPath: /mnt/nanobot/workspaces
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: gateway-data
          emptyDir: {}
        - name: common
          persistentVolumeClaim:
            claimName: nanobot-common-pvc
        - name: frontends
          persistentVolumeClaim:
            claimName: nanobot-frontends-pvc
        - name: workspaces
          persistentVolumeClaim:
            claimName: nanobot-workspaces-pvc
