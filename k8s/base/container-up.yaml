apiVersion: v1
kind: Service
metadata:
  name: container-up
  namespace: nanobot
spec:
  selector:
    app: container-up
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: container-up
  namespace: nanobot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: container-up
  template:
    metadata:
      labels:
        app: container-up
    spec:
      serviceAccountName: container-up
      containers:
        - name: container-up
          image: 192.168.48.104:5000/nanobot-container-up:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: BUCKET_MOUNT_ROOT
              value: /mnt/env
            - name: BUCKET_MOUNT_PVC
              value: nanobot-data-pvc
            - name: SOURCE_ROOT
              value: /mnt/source
            - name: SOURCE_PVC
              value: nanobot-source-pvc
            - name: CONTAINER_UP_PORT
              value: "8080"
            - name: BUCKET_NAMESPACE
              value: nanobot
            - name: BUCKET_NAME_PREFIX
              value: nanobot-bucket
            - name: BUCKET_RUNTIME_IMAGE
              value: 192.168.48.104:5000/nanobot-bucket-runtime:v1.0.1
            - name: BUCKET_IMAGE_PULL_POLICY
              value: IfNotPresent
            - name: BUCKET_SERVICE_PORT
              value: "8080"
            - name: BUCKET_CONTAINER_PORT
              value: "8080"
            - name: BUCKET_MAX_INSTANCES_PER_BUCKET
              value: "20"
            - name: BUCKET_IDLE_TTL_SECONDS
              value: "600"
            - name: BUCKET_IDLE_SWEEP_INTERVAL_SECONDS
              value: "60"
          volumeMounts:
            - name: bucket-mount-root
              mountPath: /mnt/env
            - name: source-root
              mountPath: /mnt/source
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: bucket-mount-root
          persistentVolumeClaim:
            claimName: nanobot-data-pvc
        - name: source-root
          persistentVolumeClaim:
            claimName: nanobot-source-pvc
