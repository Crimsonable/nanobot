apiVersion: v1
kind: Service
metadata:
  name: nanobot-bucket-0
  namespace: nanobot
  labels:
    app: nanobot-bucket
    bucket-id: bucket-0
spec:
  selector:
    app: nanobot-bucket
    bucket-id: bucket-0
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanobot-bucket-0
  namespace: nanobot
  labels:
    app: nanobot-bucket
    bucket-id: bucket-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanobot-bucket
      bucket-id: bucket-0
  template:
    metadata:
      labels:
        app: nanobot-bucket
        bucket-id: bucket-0
    spec:
      containers:
        - name: bucket-runtime
          image: nanobot-bucket-runtime:v1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: BUCKET_RUNTIME_PORT
              value: "8080"
            - name: BUCKET_ID
              value: bucket-0
            - name: BUCKET_MOUNT_ROOT
              value: /mnt/env
            - name: BUCKET_MOUNT_PVC
              value: nanobot-data-pvc
            - name: SOURCE_ROOT
              value: /mnt/source
            - name: SOURCE_PVC
              value: nanobot-source-pvc
            - name: OUTBOUND_GATEWAY_URL
              value: http://container-up.nanobot:8080/outbound
            - name: INSTANCE_IDLE_TTL_SECONDS
              value: "1800"
            - name: INSTANCE_STOP_GRACE_SECONDS
              value: "10"
            - name: INSTANCE_EVICT_INTERVAL_SECONDS
              value: "60"
            - name: MAX_PROCESSES_PER_BUCKET
              value: "30"
            - name: NANOBOT_PORT_START
              value: "20000"
            - name: NANOBOT_PORT_END
              value: "29999"
          volumeMounts:
            - name: bucket-mount-root
              mountPath: /mnt/env
            - name: source-root
              mountPath: /mnt/source
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: bucket-mount-root
          persistentVolumeClaim:
            claimName: nanobot-data-pvc
        - name: source-root
          persistentVolumeClaim:
            claimName: nanobot-source-pvc
