services:
  nanobot-bridge-image:
    image: nanobot-bridge:latest
    build:
      context: .
      dockerfile: Dockerfile.bridge
    profiles:
      - build-only

  container-up:
    container_name: container-up
    image: nanobot-container-up:latest
    build:
      context: .
      dockerfile: Dockerfile.container_up
    restart: unless-stopped
    environment:
      CONTAINER_UP_HOST: 0.0.0.0
      CONTAINER_UP_PORT: ${CONTAINER_UP_PORT:-8080}
      CONTAINER_UP_DB_PATH: /var/lib/container_up/container_up.db
      HOST_WORKSPACE_ROOT: ${HOST_WORKSPACE_ROOT:-/opt/nanobot/workspaces}
      HOST_SHARED_CONFIG: ${HOST_SHARED_CONFIG:-/opt/nanobot/shared/config.json}
      HOST_SHARED_SKILLS: ${HOST_SHARED_SKILLS:-/opt/nanobot/shared/skills}
      CHILD_IMAGE: ${CHILD_IMAGE:-nanobot-bridge:latest}
      CHILD_NETWORK: nanobot-stack
      CHILD_BRIDGE_TOKEN: ${CHILD_BRIDGE_TOKEN:-}
      PARENT_BRIDGE_URL: ${PARENT_BRIDGE_URL:-ws://container-up:${CONTAINER_UP_PORT:-8080}/ws/bridge}
      CHILD_READY_TIMEOUT: ${CHILD_READY_TIMEOUT:-90}
      FORWARD_TIMEOUT: ${FORWARD_TIMEOUT:-300}
      IDLE_TIMEOUT_SECONDS: ${IDLE_TIMEOUT_SECONDS:-3600}
      CLEANUP_SCAN_INTERVAL: ${CLEANUP_SCAN_INTERVAL:-300}
      INSTANCE_IDLE_TIMEOUT_SECONDS: ${INSTANCE_IDLE_TIMEOUT_SECONDS:-1800}
    ports:
      - "${CONTAINER_UP_PUBLIC_PORT:-8080}:${CONTAINER_UP_PORT:-8080}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CONTAINER_UP_DATA:-/opt/nanobot/container_up}:/var/lib/container_up
      - ${HOST_WORKSPACE_ROOT:-/opt/nanobot/workspaces}:${HOST_WORKSPACE_ROOT:-/opt/nanobot/workspaces}
      - ${HOST_SHARED_CONFIG:-/opt/nanobot/shared/config.json}:${HOST_SHARED_CONFIG:-/opt/nanobot/shared/config.json}:ro
      - ${HOST_SHARED_SKILLS:-/opt/nanobot/shared/skills}:${HOST_SHARED_SKILLS:-/opt/nanobot/shared/skills}:ro
    networks:
      - nanobot-stack

networks:
  nanobot-stack:
    name: nanobot-stack
